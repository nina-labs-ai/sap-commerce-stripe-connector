        // Uncomment if spartacussampledata is available in the local Commerce installation.
        // extName 'spartacussampledata'
        // extName 'stripespartacussampledata'
    }

    addons {
        forStoreFronts('yacceleratorstorefront') {
            names('captchaaddon', 'commerceorgsamplesaddon', 'assistedservicestorefront',
                    'assistedservicecustomerinterestsaddon', 'assistedserviceyprofileaddon',
                    'assistedservicepromotionaddon', 'customerticketingaddon',
                    'textfieldconfiguratortemplateaddon', 'smarteditaddon',
                    'consignmenttrackingaddon', 'notificationaddon', 'customerinterestsaddon',
                    'stocknotificationaddon', 'orderselfserviceaddon',
                    'adaptivesearchsamplesaddon', 'configurablebundleaddon',
                    'pcmbackofficesamplesaddon', 'xyformssamples', 'xyformsstorefrontcommons',
                    'personalizationyprofilesampledataaddon', 'personalizationaddon',
                    'profiletagaddon', 'merchandisingaddon', 'spartacussampledataaddon',
                    'merchandisingstorefrontsampledataaddon')
            template 'yacceleratorstorefront'
        }
    }
}

task setup {
    doLast {
        pl.setup()
    }
}

task buildSystem(dependsOn: setup) {
    doLast {
        pl.build()
    }
}

task initialize(dependsOn: buildSystem) {
    doLast {
        pl.initialize()
    }
}

task start {
    doLast {
        pl.start()
    }
}

task startInBackground {
    doLast {
        pl.startInBackground()
    }
}

task stopInBackground {
    doLast {
        pl.stopInBackground()
    }
}
