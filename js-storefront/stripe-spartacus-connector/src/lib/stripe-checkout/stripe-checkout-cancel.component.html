<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <h1 class="mb-3">Stripe Checkout canceled</h1>
      <p class="text-muted mb-4">
        The hosted Stripe page returned to the storefront without a completed payment.
      </p>

      <div *ngIf="isLoading" class="card">
        <div class="card-body">
          <p class="mb-0">Closing the active Stripe Checkout Session…</p>
        </div>
      </div>

      <div *ngIf="!isLoading && session" class="alert alert-warning">
        Stripe session <code>{{ session.id }}</code> is now
        <code>{{ session.status || 'unknown' }}</code>
        /
        <code>{{ session.paymentStatus || 'unknown' }}</code>.
      </div>

      <div *ngIf="!isLoading && errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>
    </div>
  </div>
</section>
