# stripebackoffice.key=value

# Specifies the location of the spring context file putted automatically to the global platform application context.
stripebackoffice.application-context=stripebackoffice-spring.xml

# Logger configuration for configuration support wiring.
log4j2.logger.stripebackofficeConfigurationService.name = com.cci.hybris.stripe.backoffice.service.impl.DefaultStripeBackofficeConfigurationService
log4j2.logger.stripebackofficeConfigurationService.level = INFO
log4j2.logger.stripebackofficeConfigurationService.appenderRef.stdout.ref = STDOUT
