# stripefulfilmentprocess.key=value

# Specifies the location of the spring context file putted automatically to the global platform application context.
stripefulfilmentprocess.application-context=stripefulfilmentprocess-spring.xml

log4j2.logger.stripeFulfilmentProcess.name = com.cci.hybris.stripe.fulfilmentprocess
log4j2.logger.stripeFulfilmentProcess.level = INFO
log4j2.logger.stripeFulfilmentProcess.appenderRef.stdout.ref = STDOUT
